{% load static %}
<!DOCTYPE html>
<html lang="pt-BR" style="height:100%;overflow:hidden;">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>{% block title %}PDV{% endblock %} — iNoovaTed</title>
  <script>
    (function() {
      function applyPdvTheme() {
        var temaClaro = localStorage.getItem('erp-tema') === 'claro';
        document.documentElement.classList.toggle('tema-claro', temaClaro);
        document.documentElement.classList.toggle('tema-escuro', !temaClaro);
        document.documentElement.style.colorScheme = temaClaro ? 'light' : 'dark';
        if (document.body) {
          document.body.classList.toggle('tema-claro', temaClaro);
          document.body.classList.toggle('tema-escuro', !temaClaro);
        }
        window.__erpTemaClaroInicial = temaClaro;
        return temaClaro;
      }
      window.__erpApplyPdvTheme = applyPdvTheme;
      applyPdvTheme();
      document.addEventListener('DOMContentLoaded', applyPdvTheme, { once: true });
      window.addEventListener('pageshow', applyPdvTheme);
    })();
  </script>
  <link rel="icon" href="{% static 'favicon.svg' %}" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/tailwind-built.css' %}">
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; margin: 0; padding: 0; }
    body { font-family: Inter, ui-sans-serif, system-ui, sans-serif; background: #161618; color: #f8fafc; }
    html.tema-claro body { background: #f3f6fb; color: #111827; }
    html.tema-escuro body { background: #161618; color: #f8fafc; }
    [x-cloak] { display: none !important; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: #16161f; }
    ::-webkit-scrollbar-thumb { background: #3a3a4e; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #4a4a60; }
    input[type=number] { -moz-appearance: textfield; appearance: textfield; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
  {% block body %}{% endblock %}
  {% block extra_scripts %}{% endblock %}
</body>
</html>
