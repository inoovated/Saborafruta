version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: erp_db
    environment:
      POSTGRES_DB: erp_inoovated
      POSTGRES_USER: erp
      POSTGRES_PASSWORD: erp
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: erp_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    container_name: erp_web
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DEBUG: "True"
      SECRET_KEY: "change-me-dev-only"
      ALLOWED_HOSTS: "localhost,127.0.0.1,web"
      DATABASE_URL: "postgres://erp:erp@db:5432/erp_inoovated"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "django-db"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_worker:
    build: .
    container_name: erp_celery_worker
    command: celery -A config worker -l info
    volumes:
      - .:/app
    environment:
      DEBUG: "True"
      SECRET_KEY: "change-me-dev-only"
      DATABASE_URL: "postgres://erp:erp@db:5432/erp_inoovated"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "django-db"
    depends_on:
      - web
      - redis

  celery_beat:
    build: .
    container_name: erp_celery_beat
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    environment:
      DEBUG: "True"
      SECRET_KEY: "change-me-dev-only"
      DATABASE_URL: "postgres://erp:erp@db:5432/erp_inoovated"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "django-db"
    depends_on:
      - web
      - redis

volumes:
  postgres_data:
