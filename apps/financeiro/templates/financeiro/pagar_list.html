{% extends "_base.html" %}
{% block title %}Contas a pagar{% endblock %}
{% block content %}
<div class="bg-white dark:bg-gray-900 rounded-xl border border-gray-200 dark:border-gray-800 p-6 shadow-sm">
  <div class="flex flex-col md:flex-row md:items-start md:justify-between gap-3">
    <div>
      <h2 class="text-xl font-bold mb-2">{{ title|default:"Contas a pagar" }}</h2>
      <p class="text-sm text-gray-500">Pagina em construcao. Use o <a href="/admin/" class="text-blue-600 underline">Django Admin</a> para gerenciar registros enquanto a UI desta secao e finalizada.</p>
    </div>
    <div class="flex flex-wrap gap-2">
      <a href="{% url 'financeiro:plano_contas_despesas' %}" class="btn-secondary">Plano de contas</a>
      <a href="{% url 'financeiro:centros_custo' %}" class="btn-secondary">Centros de custo</a>
    </div>
  </div>
</div>
{% endblock %}
