{% extends "_base.html" %}
{% block title %}Contas a receber{% endblock %}

<div class="bg-white dark:bg-gray-900 rounded-xl border border-gray-200 dark:border-gray-800 p-6 shadow-sm">
  <div class="flex flex-col md:flex-row md:items-start md:justify-between gap-3">
    <div>
      <h2 class="text-xl font-bold mb-2">{{ title|default:"Contas a receber" }}</h2>

    <div class="flex flex-wrap gap-2">
      <a href="{% url 'financeiro:formas_pagamento' %}" class="btn-secondary">Formas de pagamento</a>

  </div>
