<label for="{{ field.id_for_label }}" class="produto-label">
  {{ field.label }}{% if required or field.field.required %} <span class="text-red-500">*</span>{% endif %}
</label>
{{ field }}
{% if field.help_text %}
  <p class="produto-help">{{ field.help_text }}</p>
{% endif %}
{% if field.errors %}
  <p class="produto-error">{{ field.errors|first }}</p>
{% endif %}
