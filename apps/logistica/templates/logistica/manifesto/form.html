{% extends "_base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="mx-auto max-w-6xl space-y-6">
  <div>
    <a href="{{ cancel_url }}" class="text-sm font-semibold text-blue-500 hover:text-blue-400">&lt; Voltar</a>
    <h1 class="mt-3 text-2xl font-bold text-gray-900 dark:text-white">{{ title }}</h1>
    <p class="text-sm text-gray-500 dark:text-gray-400">Informe rota, modal, transportadora, motorista e dados do veiculo.</p>
  </div>

  <form method="post" class="rounded-xl border border-gray-200 bg-white p-6 dark:border-gray-800 dark:bg-gray-900">
    {% csrf_token %}
    {% if form.non_field_errors %}
      <div class="mb-4 rounded-lg border border-red-500/30 bg-red-500/10 p-3 text-sm text-red-500">{{ form.non_field_errors }}</div>
    {% endif %}

    <div class="grid gap-4 md:grid-cols-5">
      <label class="space-y-1"><span class="text-sm font-semibold">Numero</span>{{ form.numero }}{{ form.numero.errors }}</label>
      <label class="space-y-1"><span class="text-sm font-semibold">Emissao</span>{{ form.data_emissao }}{{ form.data_emissao.errors }}</label>
      <label class="space-y-1"><span class="text-sm font-semibold">Saida</span>{{ form.data_saida }}{{ form.data_saida.errors }}</label>
      <label class="space-y-1"><span class="text-sm font-semibold">Status</span>{{ form.status }}{{ form.status.errors }}</label>
      <label class="space-y-1"><span class="text-sm font-semibold">Modal</span>{{ form.modal }}{{ form.modal.errors }}</label>
    </div>

    <div class="mt-4 grid gap-4 md:grid-cols-4">
      <label class="space-y-1"><span class="text-sm font-semibold">Romaneio</span>{{ form.romaneio }}{{ form.romaneio.errors }}</label>
      <label class="space-y-1"><span class="text-sm font-semibold">Transportadora</span>{{ form.transportadora }}{{ form.transportadora.errors }}</label>
      <label class="space-y-1"><span class="text-sm font-semibold">Motorista</span>{{ form.motorista_nome }}{{ form.motorista_nome.errors }}</label>
      <label class="space-y-1"><span class="text-sm font-semibold">Documento motorista</span>{{ form.motorista_documento }}{{ form.motorista_documento.errors }}</label>
    </div>

    <div class="mt-4 grid gap-4 md:grid-cols-3">
      <label class="space-y-1"><span class="text-sm font-semibold">Placa</span>{{ form.veiculo_placa }}{{ form.veiculo_placa.errors }}</label>
      <label class="space-y-1 md:col-span-2"><span class="text-sm font-semibold">Veiculo</span>{{ form.veiculo_descricao }}{{ form.veiculo_descricao.errors }}</label>
    </div>

    <div class="mt-4 grid gap-4 md:grid-cols-4">
      <label class="space-y-1"><span class="text-sm font-semibold">Cidade origem</span>{{ form.cidade_origem }}{{ form.cidade_origem.errors }}</label>
      <label class="space-y-1"><span class="text-sm font-semibold">UF origem</span>{{ form.uf_origem }}{{ form.uf_origem.errors }}</label>
      <label class="space-y-1"><span class="text-sm font-semibold">Cidade destino</span>{{ form.cidade_destino }}{{ form.cidade_destino.errors }}</label>
      <label class="space-y-1"><span class="text-sm font-semibold">UF destino</span>{{ form.uf_destino }}{{ form.uf_destino.errors }}</label>
    </div>

    <label class="mt-4 block space-y-1"><span class="text-sm font-semibold">Percurso</span>{{ form.percurso }}{{ form.percurso.errors }}</label>
    <label class="mt-4 block space-y-1"><span class="text-sm font-semibold">Observacao</span>{{ form.observacao }}{{ form.observacao.errors }}</label>

    <div class="mt-6 flex flex-wrap justify-end gap-3">
      <a href="{{ cancel_url }}" class="rounded-lg border border-gray-300 px-4 py-2 text-sm font-semibold text-gray-700 hover:bg-gray-100 dark:border-gray-700 dark:text-gray-200 dark:hover:bg-gray-800">Cancelar</a>
      <button class="rounded-lg bg-blue-600 px-5 py-2 text-sm font-semibold text-white hover:bg-blue-500">Salvar</button>
    </div>
  </form>
</div>
{% endblock %}
